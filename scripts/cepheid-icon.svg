<!--
  CEPHEID PWA icon (sorgente). 1024x1024.
  Vertice CEPHEID (525, 400) del Schlegel ottaedro di SIDERA, centrato a (512,512).
  Trasformazione: scala uniforme k = 1.21 attorno a CEPHEID (così l'edge più lungo
  arriva a ~460 dal centro, dentro la canvas 1024). Preserva la geometria del grafo:
    QUASAR  (340, 68)   → (288, 110)   — far  upper-left
    PULSAR  (405, 252)  → (367, 333)   — near upper-left
    MAGNETAR(340, 364)  → (288, 468)   — near left
    NEBULA  (155, 400)  → ( 64, 512)   — far  left
-->
<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#2A1F08"/>
      <stop offset="100%" stop-color="#0F0A05"/>
    </linearGradient>
    <radialGradient id="halo-grad" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#D4A020" stop-opacity="0.55"/>
      <stop offset="55%"  stop-color="#D4A020" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#D4A020" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="edge-q" x1="512" y1="512" x2="288" y2="110" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#D4A020" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#D4A020" stop-opacity="0.15"/>
    </linearGradient>
    <linearGradient id="edge-p" x1="512" y1="512" x2="367" y2="333" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#D4A020" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#D4A020" stop-opacity="0.15"/>
    </linearGradient>
    <linearGradient id="edge-m" x1="512" y1="512" x2="288" y2="468" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#D4A020" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#D4A020" stop-opacity="0.15"/>
    </linearGradient>
    <linearGradient id="edge-n" x1="512" y1="512" x2="64"  y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#D4A020" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#D4A020" stop-opacity="0.15"/>
    </linearGradient>
  </defs>

  <rect width="1024" height="1024" fill="url(#bg-grad)"/>
  <circle cx="512" cy="512" r="400" fill="url(#halo-grad)"/>

  <g stroke-width="7" stroke-linecap="round" fill="none">
    <line x1="512" y1="512" x2="288" y2="110" stroke="url(#edge-q)"/>
    <line x1="512" y1="512" x2="367" y2="333" stroke="url(#edge-p)"/>
    <line x1="512" y1="512" x2="288" y2="468" stroke="url(#edge-m)"/>
    <line x1="512" y1="512" x2="64"  y2="512" stroke="url(#edge-n)"/>
  </g>

  <circle cx="512" cy="512" r="135" fill="#D4A020" opacity="0.22"/>
  <circle cx="512" cy="512" r="85"  fill="#D4A020" opacity="0.45"/>
  <circle cx="512" cy="512" r="58"  fill="#D4A020"/>
</svg>
