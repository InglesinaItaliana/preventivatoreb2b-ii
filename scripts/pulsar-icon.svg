<!--
  PULSAR PWA icon (sorgente). 1024x1024.
  Vertice PULSAR estratto dal diagramma Schlegel di SIDERA + le sue 4 connessioni.
  Convertito in PNG con sharp-cli per generare pulsar-180/192/512.png.
-->
<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#0E1620"/>
      <stop offset="100%" stop-color="#05090F"/>
    </linearGradient>
    <radialGradient id="halo-grad" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#3AAF98" stop-opacity="0.55"/>
      <stop offset="55%"  stop-color="#3AAF98" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#3AAF98" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="edge1" x1="512" y1="512" x2="359" y2="78" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#3AAF98" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#3AAF98" stop-opacity="0.15"/>
    </linearGradient>
    <linearGradient id="edge2" x1="512" y1="512" x2="795" y2="861" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#3AAF98" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#3AAF98" stop-opacity="0.15"/>
    </linearGradient>
    <linearGradient id="edge3" x1="512" y1="512" x2="205" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#3AAF98" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#3AAF98" stop-opacity="0.15"/>
    </linearGradient>
    <linearGradient id="edge4" x1="512" y1="512" x2="359" y2="776" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#3AAF98" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#3AAF98" stop-opacity="0.15"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1024" height="1024" fill="url(#bg-grad)"/>

  <!-- Halo grande dietro al vertice -->
  <circle cx="512" cy="512" r="400" fill="url(#halo-grad)"/>

  <!-- 4 edges del vertice PULSAR (verso V1, V3, V5, V6 in coordinate SIDERA) -->
  <g stroke-width="7" stroke-linecap="round" fill="none">
    <line x1="512" y1="512" x2="359" y2="78"  stroke="url(#edge1)"/>
    <line x1="512" y1="512" x2="795" y2="861" stroke="url(#edge2)"/>
    <line x1="512" y1="512" x2="205" y2="512" stroke="url(#edge3)"/>
    <line x1="512" y1="512" x2="359" y2="776" stroke="url(#edge4)"/>
  </g>

  <!-- Halo medio + piccolo attorno al vertice -->
  <circle cx="512" cy="512" r="135" fill="#3AAF98" opacity="0.22"/>
  <circle cx="512" cy="512" r="85"  fill="#3AAF98" opacity="0.45"/>

  <!-- Vertice PULSAR -->
  <circle cx="512" cy="512" r="58" fill="#3AAF98"/>
</svg>
