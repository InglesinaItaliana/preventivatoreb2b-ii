<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#FFFFFF" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="POPS" />
    <meta name="mobile-web-app-capable" content="yes" />
    <!-- Manifest e apple-touch-icon iniettati dallo script inline qui sotto in base al path,
         prima del primo paint. Niente hardcoded qui per evitare race condition su iOS "Add to Home". -->
    <title>P.O.P.S. Inglesina Italiana</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet">
    <script>
      // Pattern "suite of webapps": iniettiamo manifest + apple-touch-icon SEMPRE
      // in base al path, prima del primo paint. Niente hardcoded sopra per evitare
      // che iOS "Add to Home" legga eager il manifest sbagliato. Vedi POLARIS.md azione 2.
      (function () {
        try {
          var path = window.location.pathname || '';
          var head = document.head;
          var titleMeta = head.querySelector('meta[name="apple-mobile-web-app-title"]');

          function addManifest(href) {
            var l = document.createElement('link');
            l.rel = 'manifest';
            l.href = href;
            head.appendChild(l);
          }
          function addAppleIcons(prefix, cacheBust) {
            [['180x180', prefix + '-180.png'], ['192x192', prefix + '-192.png'], ['512x512', prefix + '-512.png']].forEach(function (pair) {
              var l = document.createElement('link');
              l.rel = 'apple-touch-icon';
              l.setAttribute('sizes', pair[0]);
              l.href = pair[1] + (cacheBust ? '?v=' + cacheBust : '');
              head.appendChild(l);
            });
          }

          function setFavicon(href, type) {
            var l = head.querySelector("link[rel~='icon']");
            if (!l) {
              l = document.createElement('link');
              l.rel = 'icon';
              head.appendChild(l);
            }
            l.type = type;
            l.href = href;
          }

          // Identita' tab browser: tutta la suite-of-webapps mostra favicon
          // Schlegel + titolo "Sistema SIDERA" (brand unificato in tab desktop).
          // Manifest e apple-touch-icon restano per-scope: servono per l'icona
          // PWA quando l'utente fa "Aggiungi a Home Screen".
          if (path.indexOf('/pulsar') === 0) {
            addManifest('/pulsar.webmanifest');
            addAppleIcons('/icons/pulsar', null);
            document.title = 'Sistema SIDERA';
            setFavicon('/favicon-sidera.svg', 'image/svg+xml');
            if (titleMeta) titleMeta.setAttribute('content', 'PULSAR');
          } else if (path.indexOf('/cepheid') === 0) {
            addManifest('/cepheid.webmanifest');
            addAppleIcons('/icons/cepheid', '2');
            document.title = 'Sistema SIDERA';
            setFavicon('/favicon-sidera.svg', 'image/svg+xml');
            if (titleMeta) titleMeta.setAttribute('content', 'CEPHEID');
          } else if (path.indexOf('/nebula') === 0) {
            addManifest('/nebula.webmanifest');
            addAppleIcons('/icons/nebula', null);
            document.title = 'Sistema SIDERA';
            setFavicon('/favicon-sidera.svg', 'image/svg+xml');
            if (titleMeta) titleMeta.setAttribute('content', 'NEBULA');
          } else if (path.indexOf('/quasar') === 0) {
            addManifest('/quasar.webmanifest');
            addAppleIcons('/icons/quasar', null);
            document.title = 'Sistema SIDERA';
            setFavicon('/favicon-sidera.svg', 'image/svg+xml');
            if (titleMeta) titleMeta.setAttribute('content', 'QUASAR');
          } else if (path.indexOf('/sidera') === 0) {
            // SIDERA: shell desktop, niente PWA manifest.
            document.title = 'Sistema SIDERA';
            setFavicon('/favicon-sidera.svg', 'image/svg+xml');
            if (titleMeta) titleMeta.setAttribute('content', 'SIDERA');
          } else {
            // POPS default (qualsiasi altro path: /, /preventivatore, /production, /delivery, ...)
            addManifest('/pops.webmanifest');
            addAppleIcons('/icons/pops', null);
            if (titleMeta) titleMeta.setAttribute('content', 'POPS');
          }
        } catch (_e) { /* ignore */ }
      })();
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
