<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#FFFFFF" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="POPS" />
    <meta name="mobile-web-app-capable" content="yes" />
    <link rel="manifest" href="/pops.webmanifest" />
    <link rel="apple-touch-icon" sizes="180x180" href="/icons/pops-180.png" />
    <link rel="apple-touch-icon" sizes="192x192" href="/icons/pops-192.png" />
    <link rel="apple-touch-icon" sizes="512x512" href="/icons/pops-512.png" />
    <title>P.O.P.S. Inglesina Italiana</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet">
    <script>
      // Pattern "suite of webapps": default POPS, swap a PULSAR o CEPHEID in base al path
      // prima del bootstrap Vue. Manifest statici in /public/. Vedi POLARIS.md azione 2.
      (function () {
        try {
          var path = window.location.pathname || '';
          // POPS è il default: meta tag base in HTML già impostati. Esci.
          if (path.indexOf('/pulsar') !== 0 && path.indexOf('/cepheid') !== 0) return;

          var head = document.head;
          head.querySelectorAll('link[rel="manifest"]').forEach(function (el) { el.remove(); });
          head.querySelectorAll('link[rel="apple-touch-icon"]').forEach(function (el) { el.remove(); });
          var titleMeta = head.querySelector('meta[name="apple-mobile-web-app-title"]');

          function addManifest(href) {
            var l = document.createElement('link');
            l.rel = 'manifest';
            l.href = href;
            head.appendChild(l);
          }
          function addAppleIcons(prefix, cacheBust) {
            [['180x180', prefix + '-180.png'], ['192x192', prefix + '-192.png'], ['512x512', prefix + '-512.png']].forEach(function (pair) {
              var l = document.createElement('link');
              l.rel = 'apple-touch-icon';
              l.setAttribute('sizes', pair[0]);
              l.href = pair[1] + (cacheBust ? '?v=' + cacheBust : '');
              head.appendChild(l);
            });
          }

          if (path.indexOf('/pulsar') === 0) {
            addManifest('/pulsar.webmanifest');
            addAppleIcons('/icons/pulsar', null);
            if (titleMeta) titleMeta.setAttribute('content', 'PULSAR');
          } else if (path.indexOf('/cepheid') === 0) {
            addManifest('/cepheid.webmanifest');
            addAppleIcons('/icons/cepheid', '2');
            if (titleMeta) titleMeta.setAttribute('content', 'CEPHEID');
          }
        } catch (_e) { /* ignore */ }
      })();
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
