<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SIDERA — Accesso</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400;1,500&family=Outfit:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #05090F;
  --neutral-edge: #2A3F52;
  --neutral-vertex: #243648;
  --neutral-stroke: #364F66;
  --sidera-color: #D4C498;
  --module-color: #D4C498;
}

html, body { height: 100%; overflow: hidden; }

body {
  background: var(--bg);
  color: #fff;
  font-family: 'Outfit', sans-serif;
  display: flex;
  min-height: 100vh;
}

.bg { position:fixed;inset:0;overflow:hidden;pointer-events:none;z-index:0; }

.sphere {
  position: absolute;
  border-radius: 50%;
  opacity: 0;
  will-change: transform, background;
  transition: background 3.8s ease, opacity 2.2s ease;
}
.sphere.on { opacity: 1; }

.s1 { width:720px;height:720px;top:-290px;left:-200px;filter:blur(115px);animation:d1 30s ease-in-out infinite; }
.s2 { width:620px;height:620px;bottom:-220px;right:-140px;filter:blur(125px);animation:d2 37s ease-in-out infinite; }
.s3 { width:460px;height:460px;top:20%;left:22%;filter:blur(95px);animation:d3 24s ease-in-out infinite; }
.s4 { width:390px;height:390px;bottom:8%;right:28%;filter:blur(105px);animation:d4 42s ease-in-out infinite; }

@keyframes d1 { 0%,100%{transform:translate(0,0) scale(1)} 30%{transform:translate(75px,85px) scale(1.04)} 65%{transform:translate(-55px,115px) scale(0.96)} }
@keyframes d2 { 0%,100%{transform:translate(0,0) scale(1)} 35%{transform:translate(-105px,-65px) scale(1.06)} 72%{transform:translate(65px,-95px) scale(0.97)} }
@keyframes d3 { 0%,100%{transform:translate(0,0)} 42%{transform:translate(85px,-65px) scale(1.03)} 78%{transform:translate(-45px,75px) scale(0.97)} }
@keyframes d4 { 0%,100%{transform:translate(0,0)} 48%{transform:translate(65px,55px) scale(1.05)} }

.layout { position:relative;z-index:1;display:flex;width:100%;min-height:100vh; }

.left {
  flex: 1;
  min-width: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 4rem 3rem 4rem 4rem;
  gap: 2.8rem;
}

#logo-svg { width:min(300px,68%);display:block;overflow:visible; }

.brand { text-align: center; }

.brand-title {
  font-family: 'Cormorant Garamond', serif;
  font-weight: 500;
  font-size: clamp(3.4rem, 5.8vw, 5rem);
  color: var(--sidera-color);
  line-height: 1;
  letter-spacing: 0.04em;
  display: inline-flex;
  align-items: center;
}
.brand-title .ltr { display: inline-block; }
.brand-title .dot {
  display: inline-flex;
  align-items: center;
  font-size: 0.4em;
  opacity: 0.38;
  padding: 0 0.3em;
  line-height: 1;
  position: relative;
  top: 0.04em;
}

.module-display {
  margin-top: 2rem;
  min-height: 72px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 0.7rem;
  transition: opacity 0.4s ease;
}
.module-display.fading { opacity: 0; }

#module-name {
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  font-weight: 300;
  font-size: clamp(1.15rem, 2.2vw, 1.55rem);
  letter-spacing: 0.38em;
  color: #fff;
  min-height: 1.6em;
}

.sep {
  width: 28px;
  height: 1px;
  background: rgba(255,255,255,0.13);
  flex-shrink: 0;
  transition: opacity 0.4s ease;
}

#module-desc {
  font-family: 'Outfit', sans-serif;
  font-weight: 300;
  font-size: 0.67rem;
  letter-spacing: 0.2em;
  color: rgba(255,255,255,0.3);
  text-transform: uppercase;
}

.right {
  width: clamp(340px, 37%, 430px);
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 3rem 3.5rem;
  border-left: 1px solid rgba(255,255,255,0.05);
  background: rgba(255,255,255,0.014);
  opacity: 0;
  transform: translateX(22px);
  transition: opacity 1.1s ease, transform 1.1s ease;
}
.right.on { opacity: 1; transform: translateX(0); }

.login-card { width: 100%; }

.login-heading {
  font-family: 'Cormorant Garamond', serif;
  font-weight: 400;
  font-size: 1.45rem;
  letter-spacing: 0.38em;
  color: rgba(255,255,255,0.5);
  margin-bottom: 2.8rem;
}

.field { margin-bottom: 1.35rem; }

.field label {
  display: block;
  font-family: 'Outfit', sans-serif;
  font-weight: 300;
  font-size: 0.64rem;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: rgba(255,255,255,0.3);
  margin-bottom: 0.5rem;
}

.field input {
  width: 100%;
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(255,255,255,0.07);
  border-radius: 3px;
  padding: 0.82rem 1rem;
  color: rgba(255,255,255,0.82);
  font-family: 'Outfit', sans-serif;
  font-weight: 300;
  font-size: 0.875rem;
  outline: none;
  transition: border-color 0.3s ease, background 0.3s ease;
}
.field input::placeholder { color: rgba(255,255,255,0.16); }
.field input:focus { border-color: var(--module-color); background: rgba(255,255,255,0.05); }

.forgot {
  display: block;
  text-align: right;
  font-family: 'Outfit', sans-serif;
  font-size: 0.64rem;
  font-weight: 300;
  letter-spacing: 0.14em;
  color: rgba(255,255,255,0.2);
  cursor: pointer;
  margin-top: -0.5rem;
  margin-bottom: 1.8rem;
  transition: color 0.3s ease;
}
.forgot:hover { color: rgba(255,255,255,0.46); }

.btn-login {
  width: 100%;
  padding: 0.88rem 1rem;
  background: transparent;
  border: 1px solid var(--module-color);
  color: var(--module-color);
  font-family: 'Outfit', sans-serif;
  font-weight: 500;
  font-size: 0.7rem;
  letter-spacing: 0.3em;
  text-transform: uppercase;
  border-radius: 3px;
  cursor: pointer;
  transition: background 0.35s ease, color 0.35s ease, border-color 0.35s ease;
}
.btn-login:hover { background: var(--module-color); color: var(--bg); }

.card-footer {
  margin-top: 2rem;
  border-top: 1px solid rgba(255,255,255,0.05);
  padding-top: 1.4rem;
  text-align: center;
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  font-weight: 300;
  font-size: 0.78rem;
  letter-spacing: 0.12em;
  color: rgba(255,255,255,0.13);
}
</style>
</head>
<body>

<div class="bg">
  <div class="sphere s1" id="s1"></div>
  <div class="sphere s2" id="s2"></div>
  <div class="sphere s3" id="s3"></div>
  <div class="sphere s4" id="s4"></div>
</div>

<div class="layout">

  <div class="left">
    <!--
      Vertici ottaedro — Schlegel
      Outer : V1 QUASAR(340,68)   V2 NEBULA(155,400)   V3 CEPHEID(525,400)
      Inner : V4 PULSAR(405,252)  V5 NOVA(275,252)     V6 MAGNETAR(340,364)
      Inner triangle centrato sul baricentro esterno (340,289), circumraggio 75px.
      Distanza di ogni inner-vertex dal proprio outer-edge ≈ 36px — celle bilanciate.
    -->
    <svg id="logo-svg" viewBox="0 0 680 480" xmlns="http://www.w3.org/2000/svg" aria-label="Logo SIDERA">
      <defs id="svg-defs">
        <filter id="gf-sm" x="-80%" y="-80%" width="260%" height="260%">
          <feGaussianBlur stdDeviation="4.5" result="b"/>
          <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
        <filter id="gf-md" x="-120%" y="-120%" width="340%" height="340%">
          <feGaussianBlur stdDeviation="9" result="b"/>
          <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
        <filter id="gf-lg" x="-180%" y="-180%" width="460%" height="460%">
          <feGaussianBlur stdDeviation="18" result="b"/>
          <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
        <!-- mano di luce che scorre sui lati -->
        <linearGradient id="sweep-grad" gradientUnits="userSpaceOnUse" x1="-90" y1="240" x2="90" y2="240">
          <stop offset="0%"   stop-color="#D4C498" stop-opacity="0"/>
          <stop offset="50%"  stop-color="#D4C498" stop-opacity="1"/>
          <stop offset="100%" stop-color="#D4C498" stop-opacity="0"/>
          <animateTransform attributeName="gradientTransform" type="translate" values="-450 0; 1130 0" dur="3.2s" repeatCount="indefinite"/>
        </linearGradient>
      </defs>

      <!-- outer edges -->
      <line id="e-v1v2" x1="340" y1="68"  x2="155" y2="400" stroke-width="1.2" fill="none"/>
      <line id="e-v2v3" x1="155" y1="400" x2="525" y2="400" stroke-width="1.2" fill="none"/>
      <line id="e-v3v1" x1="525" y1="400" x2="340" y2="68"  stroke-width="1.2" fill="none"/>
      <!-- inner edges -->
      <line id="e-v5v4" x1="275" y1="252" x2="405" y2="252" stroke-width="1.2" fill="none"/>
      <line id="e-v4v6" x1="405" y1="252" x2="340" y2="364" stroke-width="1.2" fill="none"/>
      <line id="e-v6v5" x1="340" y1="364" x2="275" y2="252" stroke-width="1.2" fill="none"/>
      <!-- cross edges -->
      <line id="e-v1v4" x1="340" y1="68"  x2="405" y2="252" stroke-width="1.2" fill="none"/>
      <line id="e-v1v5" x1="340" y1="68"  x2="275" y2="252" stroke-width="1.2" fill="none"/>
      <line id="e-v2v5" x1="155" y1="400" x2="275" y2="252" stroke-width="1.2" fill="none"/>
      <line id="e-v2v6" x1="155" y1="400" x2="340" y2="364" stroke-width="1.2" fill="none"/>
      <line id="e-v3v4" x1="525" y1="400" x2="405" y2="252" stroke-width="1.2" fill="none"/>
      <line id="e-v3v6" x1="525" y1="400" x2="340" y2="364" stroke-width="1.2" fill="none"/>

      <!-- glow lati: alone morbido, solo ciclo SIDERA -->
      <g id="edge-glow" opacity="0" style="transition:opacity .9s ease">
        <line x1="340" y1="68"  x2="155" y2="400" stroke="#D4C498" stroke-width="3.5" fill="none" filter="url(#gf-sm)"/>
        <line x1="155" y1="400" x2="525" y2="400" stroke="#D4C498" stroke-width="3.5" fill="none" filter="url(#gf-sm)"/>
        <line x1="525" y1="400" x2="340" y2="68"  stroke="#D4C498" stroke-width="3.5" fill="none" filter="url(#gf-sm)"/>
        <line x1="275" y1="252" x2="405" y2="252" stroke="#D4C498" stroke-width="3.5" fill="none" filter="url(#gf-sm)"/>
        <line x1="405" y1="252" x2="340" y2="364" stroke="#D4C498" stroke-width="3.5" fill="none" filter="url(#gf-sm)"/>
        <line x1="340" y1="364" x2="275" y2="252" stroke="#D4C498" stroke-width="3.5" fill="none" filter="url(#gf-sm)"/>
        <line x1="340" y1="68"  x2="405" y2="252" stroke="#D4C498" stroke-width="3.5" fill="none" filter="url(#gf-sm)"/>
        <line x1="340" y1="68"  x2="275" y2="252" stroke="#D4C498" stroke-width="3.5" fill="none" filter="url(#gf-sm)"/>
        <line x1="155" y1="400" x2="275" y2="252" stroke="#D4C498" stroke-width="3.5" fill="none" filter="url(#gf-sm)"/>
        <line x1="155" y1="400" x2="340" y2="364" stroke="#D4C498" stroke-width="3.5" fill="none" filter="url(#gf-sm)"/>
        <line x1="525" y1="400" x2="405" y2="252" stroke="#D4C498" stroke-width="3.5" fill="none" filter="url(#gf-sm)"/>
        <line x1="525" y1="400" x2="340" y2="364" stroke="#D4C498" stroke-width="3.5" fill="none" filter="url(#gf-sm)"/>
      </g>
      <!-- sweep: mano di luce che li attraversa tutti -->
      <g id="edge-sweep" opacity="0" style="transition:opacity .9s ease">
        <line x1="340" y1="68"  x2="155" y2="400" stroke="url(#sweep-grad)" stroke-width="2" fill="none"/>
        <line x1="155" y1="400" x2="525" y2="400" stroke="url(#sweep-grad)" stroke-width="2" fill="none"/>
        <line x1="525" y1="400" x2="340" y2="68"  stroke="url(#sweep-grad)" stroke-width="2" fill="none"/>
        <line x1="275" y1="252" x2="405" y2="252" stroke="url(#sweep-grad)" stroke-width="2" fill="none"/>
        <line x1="405" y1="252" x2="340" y2="364" stroke="url(#sweep-grad)" stroke-width="2" fill="none"/>
        <line x1="340" y1="364" x2="275" y2="252" stroke="url(#sweep-grad)" stroke-width="2" fill="none"/>
        <line x1="340" y1="68"  x2="405" y2="252" stroke="url(#sweep-grad)" stroke-width="2" fill="none"/>
        <line x1="340" y1="68"  x2="275" y2="252" stroke="url(#sweep-grad)" stroke-width="2" fill="none"/>
        <line x1="155" y1="400" x2="275" y2="252" stroke="url(#sweep-grad)" stroke-width="2" fill="none"/>
        <line x1="155" y1="400" x2="340" y2="364" stroke="url(#sweep-grad)" stroke-width="2" fill="none"/>
        <line x1="525" y1="400" x2="405" y2="252" stroke="url(#sweep-grad)" stroke-width="2" fill="none"/>
        <line x1="525" y1="400" x2="340" y2="364" stroke="url(#sweep-grad)" stroke-width="2" fill="none"/>
      </g>

      <!-- halos large -->
      <circle id="hl-quasar"   cx="340" cy="68"  r="42" filter="url(#gf-lg)" style="fill:#2A3F52;fill-opacity:0;opacity:0;transition:fill .6s,fill-opacity .6s,opacity .6s"/>
      <circle id="hl-nebula"   cx="155" cy="400" r="42" filter="url(#gf-lg)" style="fill:#2A3F52;fill-opacity:0;opacity:0;transition:fill .6s,fill-opacity .6s,opacity .6s"/>
      <circle id="hl-cepheid"  cx="525" cy="400" r="42" filter="url(#gf-lg)" style="fill:#2A3F52;fill-opacity:0;opacity:0;transition:fill .6s,fill-opacity .6s,opacity .6s"/>
      <circle id="hl-pulsar"   cx="405" cy="252" r="34" filter="url(#gf-lg)" style="fill:#2A3F52;fill-opacity:0;opacity:0;transition:fill .6s,fill-opacity .6s,opacity .6s"/>
      <circle id="hl-nova"     cx="275" cy="252" r="34" filter="url(#gf-lg)" style="fill:#2A3F52;fill-opacity:0;opacity:0;transition:fill .6s,fill-opacity .6s,opacity .6s"/>
      <circle id="hl-magnetar" cx="340" cy="364" r="34" filter="url(#gf-lg)" style="fill:#2A3F52;fill-opacity:0;opacity:0;transition:fill .6s,fill-opacity .6s,opacity .6s"/>

      <!-- halos small -->
      <circle id="hs-quasar"   cx="340" cy="68"  r="24" filter="url(#gf-md)" style="fill:#2A3F52;fill-opacity:0;opacity:0;transition:fill .5s,fill-opacity .5s,opacity .5s"/>
      <circle id="hs-nebula"   cx="155" cy="400" r="24" filter="url(#gf-md)" style="fill:#2A3F52;fill-opacity:0;opacity:0;transition:fill .5s,fill-opacity .5s,opacity .5s"/>
      <circle id="hs-cepheid"  cx="525" cy="400" r="24" filter="url(#gf-md)" style="fill:#2A3F52;fill-opacity:0;opacity:0;transition:fill .5s,fill-opacity .5s,opacity .5s"/>
      <circle id="hs-pulsar"   cx="405" cy="252" r="19" filter="url(#gf-md)" style="fill:#2A3F52;fill-opacity:0;opacity:0;transition:fill .5s,fill-opacity .5s,opacity .5s"/>
      <circle id="hs-nova"     cx="275" cy="252" r="19" filter="url(#gf-md)" style="fill:#2A3F52;fill-opacity:0;opacity:0;transition:fill .5s,fill-opacity .5s,opacity .5s"/>
      <circle id="hs-magnetar" cx="340" cy="364" r="19" filter="url(#gf-md)" style="fill:#2A3F52;fill-opacity:0;opacity:0;transition:fill .5s,fill-opacity .5s,opacity .5s"/>

      <!-- vertices -->
      <circle id="v-quasar"   cx="340" cy="68"  r="14" filter="url(#gf-sm)" style="fill:#243648;stroke:#364F66;stroke-width:.8;transition:fill .5s,stroke .5s"/>
      <circle id="v-nebula"   cx="155" cy="400" r="14" filter="url(#gf-sm)" style="fill:#243648;stroke:#364F66;stroke-width:.8;transition:fill .5s,stroke .5s"/>
      <circle id="v-cepheid"  cx="525" cy="400" r="14" filter="url(#gf-sm)" style="fill:#243648;stroke:#364F66;stroke-width:.8;transition:fill .5s,stroke .5s"/>
      <circle id="v-pulsar"   cx="405" cy="252" r="12" filter="url(#gf-sm)" style="fill:#243648;stroke:#364F66;stroke-width:.8;transition:fill .5s,stroke .5s"/>
      <circle id="v-nova"     cx="275" cy="252" r="12" filter="url(#gf-sm)" style="fill:#243648;stroke:#364F66;stroke-width:.8;transition:fill .5s,stroke .5s"/>
      <circle id="v-magnetar" cx="340" cy="364" r="12" filter="url(#gf-sm)" style="fill:#243648;stroke:#364F66;stroke-width:.8;transition:fill .5s,stroke .5s"/>
      <!-- hit areas: cerchi invisibili più grandi per hover comodo -->
      <circle id="hit-quasar"   cx="340" cy="68"  r="28" fill="transparent" style="cursor:pointer"/>
      <circle id="hit-nebula"   cx="155" cy="400" r="28" fill="transparent" style="cursor:pointer"/>
      <circle id="hit-cepheid"  cx="525" cy="400" r="28" fill="transparent" style="cursor:pointer"/>
      <circle id="hit-pulsar"   cx="405" cy="252" r="24" fill="transparent" style="cursor:pointer"/>
      <circle id="hit-nova"     cx="275" cy="252" r="24" fill="transparent" style="cursor:pointer"/>
      <circle id="hit-magnetar" cx="340" cy="364" r="24" fill="transparent" style="cursor:pointer"/>
    </svg>

    <div class="brand">
      <h1 class="brand-title">
        <span class="ltr">S</span><span class="dot">·</span>
        <span class="ltr">I</span><span class="dot">·</span>
        <span class="ltr">D</span><span class="dot">·</span>
        <span class="ltr">E</span><span class="dot">·</span>
        <span class="ltr">R</span><span class="dot">·</span>
        <span class="ltr">A</span>
      </h1>
      <div class="module-display" id="mod-display">
        <p id="module-name">&nbsp;</p>
        <div class="sep"></div>
        <p id="module-desc">&nbsp;</p>
      </div>
    </div>

  </div>

  <div class="right" id="right-panel">
    <div class="login-card">
      <p class="login-heading">Accesso</p>
      <div class="field">
        <label for="inp-email">Email</label>
        <input type="email" id="inp-email" placeholder="nome@azienda.it" autocomplete="email">
      </div>
      <div class="field">
        <label for="inp-pwd">Password</label>
        <input type="password" id="inp-pwd" placeholder="••••••••" autocomplete="current-password">
      </div>
      <a class="forgot" tabindex="0">Password dimenticata?</a>
      <button class="btn-login">Entra</button>
      <div class="card-footer">Sistema informativo aziendale</div>
    </div>
  </div>

</div>

<script>
const NE='#2A3F52', NV='#243648', NS='#364F66', SIDERA='#D4C498';

const mods = [
  null, // ciclo neutro — logo a riposo, SIDERA senza modulo
  { id:'quasar',   name:'Quasar',   desc:'Analytics · KPI · Business Intelligence',
    color:'#98C0D0', vx:340, vy:68,
    vEl:'v-quasar',   hlEl:'hl-quasar',   hsEl:'hs-quasar',
    edges:[{id:'e-v1v2',ox:155,oy:400},{id:'e-v3v1',ox:525,oy:400},{id:'e-v1v4',ox:405,oy:252},{id:'e-v1v5',ox:275,oy:252}]
  },
  { id:'nebula',   name:'Nebula',   desc:'HR · Anagrafiche · Documentale',
    color:'#C46030', vx:155, vy:400,
    vEl:'v-nebula',   hlEl:'hl-nebula',   hsEl:'hs-nebula',
    edges:[{id:'e-v1v2',ox:340,oy:68},{id:'e-v2v3',ox:525,oy:400},{id:'e-v2v5',ox:275,oy:252},{id:'e-v2v6',ox:340,oy:364}]
  },
  { id:'cepheid',  name:'Cepheid',  desc:'Project Management · Workflow · Task',
    color:'#D4A020', vx:525, vy:400,
    vEl:'v-cepheid',  hlEl:'hl-cepheid',  hsEl:'hs-cepheid',
    edges:[{id:'e-v2v3',ox:155,oy:400},{id:'e-v3v1',ox:340,oy:68},{id:'e-v3v4',ox:405,oy:252},{id:'e-v3v6',ox:340,oy:364}]
  },
  { id:'pulsar',   name:'Pulsar',   desc:'Chat · Comunicazione · Collaborazione',
    color:'#3AAF98', vx:405, vy:252,
    vEl:'v-pulsar',   hlEl:'hl-pulsar',   hsEl:'hs-pulsar',
    edges:[{id:'e-v5v4',ox:275,oy:252},{id:'e-v4v6',ox:340,oy:364},{id:'e-v1v4',ox:340,oy:68},{id:'e-v3v4',ox:525,oy:400}]
  },
  { id:'nova',     name:'Nova',     desc:'Logistica · Supply Chain · Spedizioni',
    color:'#8FAB35', vx:275, vy:252,
    vEl:'v-nova',     hlEl:'hl-nova',     hsEl:'hs-nova',
    edges:[{id:'e-v5v4',ox:405,oy:252},{id:'e-v6v5',ox:340,oy:364},{id:'e-v1v5',ox:340,oy:68},{id:'e-v2v5',ox:155,oy:400}]
  },
  { id:'magnetar', name:'Magnetar', desc:'CRM · Lead Generation · Pipeline Commerciale',
    color:'#B06842', vx:340, vy:364,
    vEl:'v-magnetar', hlEl:'hl-magnetar', hsEl:'hs-magnetar',
    edges:[{id:'e-v4v6',ox:405,oy:252},{id:'e-v6v5',ox:275,oy:252},{id:'e-v2v6',ox:155,oy:400},{id:'e-v3v6',ox:525,oy:400}]
  }
];

const allEdges=['e-v1v2','e-v2v3','e-v3v1','e-v5v4','e-v4v6','e-v6v5','e-v1v4','e-v1v5','e-v2v5','e-v2v6','e-v3v4','e-v3v6'];
const svgDefs=document.getElementById('svg-defs');
let idx=0, cycleTimer=null, hovered=false;

function stopCycle(){ if(cycleTimer){clearInterval(cycleTimer);cycleTimer=null;} }
function startCycle(){ stopCycle(); cycleTimer=setInterval(cycle,4800); }

function h2r(h){return{r:parseInt(h.slice(1,3),16),g:parseInt(h.slice(3,5),16),b:parseInt(h.slice(5,7),16)}}

function setSpheres(c){
  const{r,g,b}=h2r(c);
  document.getElementById('s1').style.background=`rgba(${r},${g},${b},.52)`;
  document.getElementById('s2').style.background=`rgba(${Math.round(r*.5)},${Math.round(g*.5)},${Math.round(b*.65)},.58)`;
  document.getElementById('s3').style.background=`rgba(${Math.round(r*.32)},${Math.round(g*.4)},${Math.round(b*.72)},.48)`;
  document.getElementById('s4').style.background=`rgba(${Math.round(r*.82)},${Math.round(g*.72)},${Math.round(b*.48)},.44)`;
}

function resetLogo(){
  allEdges.forEach(id=>document.getElementById(id).setAttribute('stroke',NE));
  document.getElementById('edge-glow').style.opacity='0';
  document.getElementById('edge-sweep').style.opacity='0';
  mods.filter(Boolean).forEach(m=>{
    document.getElementById(m.vEl).style.fill=NV;
    document.getElementById(m.vEl).style.stroke=NS;
    const hl=document.getElementById(m.hlEl); hl.style.opacity='0'; hl.style.fillOpacity='0';
    const hs=document.getElementById(m.hsEl); hs.style.opacity='0'; hs.style.fillOpacity='0';
  });
}

function activateLogo(m){
  const v=document.getElementById(m.vEl);
  v.style.fill=m.color; v.style.stroke=m.color;
  const hl=document.getElementById(m.hlEl);
  hl.style.fill=m.color; hl.style.fillOpacity='.11'; hl.style.opacity='1';
  const hs=document.getElementById(m.hsEl);
  hs.style.fill=m.color; hs.style.fillOpacity='.28'; hs.style.opacity='1';
  m.edges.forEach((e,i)=>{
    const gid=`g${i}`;
    let g=document.getElementById(gid);
    if(!g){
      g=document.createElementNS('http://www.w3.org/2000/svg','linearGradient');
      g.setAttribute('id',gid); g.setAttribute('gradientUnits','userSpaceOnUse');
      svgDefs.appendChild(g);
    }
    g.setAttribute('x1',m.vx); g.setAttribute('y1',m.vy);
    g.setAttribute('x2',e.ox); g.setAttribute('y2',e.oy);
    g.innerHTML=`<stop offset="0%" stop-color="${m.color}"/><stop offset="100%" stop-color="${NE}"/>`;
    document.getElementById(e.id).setAttribute('stroke',`url(#${gid})`);
  });
}

function revealName(el,text){
  el.innerHTML='';
  [...text].forEach((ch,i)=>{
    const s=document.createElement('span');
    s.textContent=ch===' '?'\u00A0':ch;
    s.style.cssText=`opacity:0;display:inline;transition:opacity .38s ease ${i*.065}s`;
    el.appendChild(s);
  });
  requestAnimationFrame(()=>requestAnimationFrame(()=>{
    el.querySelectorAll('span').forEach(s=>s.style.opacity='1');
  }));
}

function cycle(){
  const m=mods[idx];
  idx=(idx+1)%mods.length;
  const disp=document.getElementById('mod-display');
  disp.classList.add('fading');
  setTimeout(()=>{
    resetLogo();
    const sep=document.querySelector('.sep');
    if(m===null){
      setSpheres(SIDERA);
      document.documentElement.style.setProperty('--module-color', SIDERA);
      document.getElementById('module-name').innerHTML='&nbsp;';
      document.getElementById('module-desc').innerHTML='&nbsp;';
      // colora tutti i lati con il colore SIDERA
      allEdges.forEach(id=>document.getElementById(id).setAttribute('stroke',SIDERA));
      document.getElementById('edge-glow').style.opacity='0.45';
      document.getElementById('edge-sweep').style.opacity='1';
      sep.style.opacity='0';
      // accendi tutti i vertici con il colore SIDERA
      mods.filter(Boolean).forEach(mod=>{
        const v=document.getElementById(mod.vEl);
        v.style.fill=SIDERA; v.style.stroke=SIDERA;
        const hs=document.getElementById(mod.hsEl);
        hs.style.fill=SIDERA; hs.style.fillOpacity='.18'; hs.style.opacity='1';
      });
    } else {
      activateLogo(m);
      setSpheres(m.color);
      document.documentElement.style.setProperty('--module-color',m.color);
      revealName(document.getElementById('module-name'),m.name.toUpperCase());
      document.getElementById('module-desc').textContent=m.desc;
      sep.style.opacity='1';
    }
    disp.classList.remove('fading');
  },430);
}

setTimeout(()=>{
  document.querySelectorAll('.sphere').forEach(s=>s.classList.add('on'));
  cycle();
  startCycle();
  setTimeout(()=>document.getElementById('right-panel').classList.add('on'),1350);

  // hover sui vertici
  mods.filter(Boolean).forEach(m=>{
    const hit=document.getElementById('hit-'+m.id);
    if(!hit) return;

    hit.addEventListener('mouseenter',()=>{
      hovered=true;
      stopCycle();
      const disp=document.getElementById('mod-display');
      disp.classList.add('fading');
      setTimeout(()=>{
        resetLogo();
        activateLogo(m);
        setSpheres(m.color);
        document.documentElement.style.setProperty('--module-color',m.color);
        revealName(document.getElementById('module-name'),m.name.toUpperCase());
        document.getElementById('module-desc').textContent=m.desc;
        document.querySelector('.sep').style.opacity='1';
        disp.classList.remove('fading');
      },180);
    });

    hit.addEventListener('mouseleave',()=>{
      hovered=false;
      // riprende dal modulo successivo rispetto a quello appena visualizzato
      idx=(mods.indexOf(m)+1)%mods.length;
      startCycle();
    });
  });
},550);
</script>
</body>
</html>
