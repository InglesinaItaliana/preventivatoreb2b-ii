<!--
  PULSAR mark - estratto dal vertice PULSAR del diagramma Schlegel di SIDERA.
  PULSAR è il vertice interno superiore-destro (V4 in coordinate originali 405,252).
  Le 4 linee rappresentano le sue connessioni a Quasar (V1), Cepheid (V3), Nova (V5),
  Magnetar (V6), preservando gli angoli e le lunghezze relative del diagramma originale.
  Usa currentColor per ereditare il colore dal parent CSS.
-->
<svg viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg" fill="none">
  <defs>
    <filter id="pulsar-mark-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.4"/>
    </filter>
  </defs>

  <!-- Halo morbido di sfondo -->
  <circle cx="16" cy="16" r="8" fill="currentColor" opacity="0.16" filter="url(#pulsar-mark-glow)"/>

  <!-- 4 edges (verso Quasar, Cepheid, Nova, Magnetar) - stessi angoli del logo SIDERA -->
  <g stroke="currentColor" stroke-width="1.6" stroke-linecap="round" opacity="0.7">
    <line x1="16" y1="16" x2="12"   y2="4.7"/>
    <line x1="16" y1="16" x2="23.6" y2="25.3"/>
    <line x1="16" y1="16" x2="4"    y2="16"/>
    <line x1="16" y1="16" x2="10"   y2="26.4"/>
  </g>

  <!-- Halo piccolo attorno al vertice -->
  <circle cx="16" cy="16" r="4.4" fill="currentColor" opacity="0.28"/>

  <!-- Vertice PULSAR -->
  <circle cx="16" cy="16" r="2.9" fill="currentColor"/>
</svg>
