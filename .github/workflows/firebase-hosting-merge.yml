name: Deploy to Firebase Hosting on merge
on:
  push:
    branches:
      - main
jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      # 1. Configurazione Variabili d'ambiente per le Functions
      - name: Create .env file for Functions
        run: |
          echo "${{ secrets.ENV_FILE }}" > src/functions/.env

      # 2. Installazione dipendenze Functions
      - name: Install Functions Dependencies
        run: cd src/functions && npm ci

      # 3. Installazione dipendenze Frontend
      - name: Install Dependencies
        run: npm ci

      # 4. Build Frontend (Vue)
        # Questo corrisponde al tuo "npm run build"
      - name: Build
        run: npm run build

      # --- NUOVO STEP AGGIUNTO: Deploy delle Functions (Metodo Ufficiale) ---
      - name: Install Firebase CLI
        # Pin esatto: la 15.22.2 (24/06/2026) ha rotto l'auth via service account
        # (GOOGLE_APPLICATION_CREDENTIALS) -> "Failed to authenticate". La 15.22.1
        # e' l'ultima funzionante. Rialzare quando una release successiva lo risolve.
        run: npm install -g firebase-tools@15.22.1

      # Deploy Functions + Hosting via Firebase CLI (un unico metodo, niente action di terze parti).
      # Sostituisce FirebaseExtended/action-hosting-deploy@v0 (deprecata, runtime Node 20).
      # Usa lo stesso service account già impiegato per le functions.
      # Le preview channel restano possibili in un workflow PR separato con
      # `firebase hosting:channel:deploy <id>`.
      - name: Deploy Functions + Hosting
        run: |
          echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT_PREVENTIVATOREB2B_II }}' > sa-key.json
          export GOOGLE_APPLICATION_CREDENTIALS=sa-key.json
          firebase deploy --only functions,hosting --project preventivatoreb2b-ii
          rm sa-key.json
